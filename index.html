<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>แบบประเมินความพึงพอใจ</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
    background:#fff7ed;
}
.radio-card{
    transition:.2s;
}
.radio-card:hover{
    transform:translateY(-2px);
}
</style>

</head>

<body class="min-h-screen p-4">

<div class="max-w-3xl mx-auto">

<div class="bg-white rounded-3xl shadow-xl p-8">

<h1 class="text-3xl font-bold text-orange-600 text-center mb-2">
🧡 แบบประเมินความพึงพอใจ
</h1>

<p class="text-center text-gray-500 mb-8">
สาขาเวชศาสตร์ฟื้นฟูหัวใจและปอด
</p>

<form id="surveyForm" class="space-y-8">

<div id="questions"></div>

<div>
<label class="font-semibold block mb-2">
ข้อเสนอแนะ
</label>

<textarea
name="suggestion"
class="w-full border rounded-xl p-3"
rows="3"></textarea>
</div>

<div>
<label class="font-semibold block mb-2">
ข้อควรปรับปรุง
</label>

<textarea
name="improvement"
class="w-full border rounded-xl p-3"
rows="3"></textarea>
</div>

<button
id="submitBtn"
type="submit"
class="w-full bg-orange-500 hover:bg-orange-600 text-white py-4 rounded-xl font-bold">

บันทึกข้อมูล

</button>

</form>

<div
id="successMessage"
class="hidden mt-6 bg-green-100 text-green-700 p-4 rounded-xl">
บันทึกข้อมูลสำเร็จ
</div>

<div
id="errorMessage"
class="hidden mt-6 bg-red-100 text-red-700 p-4 rounded-xl">
เกิดข้อผิดพลาด
</div>

</div>

</div>

<script>

const API_URL =
'https://script.google.com/macros/s/XXXXXXXXXXXX/exec';

const options = [
'ดีเยี่ยม',
'ดี',
'พอใช้',
'ควรปรับปรุง'
];

const questions = [
{
name:'communication',
label:'การสื่อสารและการประสานงาน'
},
{
name:'service',
label:'เจ้าหน้าที่เอาใจใส่ เต็มใจให้บริการ'
},
{
name:'polite',
label:'เจ้าหน้าที่พูดจาสุภาพ ยิ้มแย้มแจ่มใส'
},
{
name:'overall',
label:'ความพึงพอใจโดยรวม'
}
];

const container =
document.getElementById('questions');

questions.forEach((q,index)=>{

let html=`
<div>
<label class="font-semibold block mb-3">
${index+1}. ${q.label}
</label>

<div class="grid md:grid-cols-4 gap-3">
`;

options.forEach(op=>{

html+=`
<label class="radio-card border rounded-xl p-3 cursor-pointer text-center">
<input
required
type="radio"
name="${q.name}"
value="${op}"
class="mr-2">
${op}
</label>
`;

});

html+='</div></div>';

container.innerHTML += html;

});

const form =
document.getElementById('surveyForm');

form.addEventListener('submit',async(e)=>{

e.preventDefault();

const btn =
document.getElementById('submitBtn');

btn.disabled=true;
btn.innerHTML='กำลังบันทึก...';

document
.getElementById('successMessage')
.classList.add('hidden');

document
.getElementById('errorMessage')
.classList.add('hidden');

try{

const formData = new FormData(form);

const payload = {
communication: formData.get('communication'),
service: formData.get('service'),
polite: formData.get('polite'),
overall: formData.get('overall'),
suggestion: formData.get('suggestion'),
improvement: formData.get('improvement')
};

const response = await fetch(API_URL,{
method:'POST',
headers:{
'Content-Type':'application/json'
},
body:JSON.stringify(payload)
});

const result = await response.json();

if(result.success){

form.reset();

document
.getElementById('successMessage')
.classList.remove('hidden');

}else{

throw new Error(result.message);

}

}catch(error){

document
.getElementById('errorMessage')
.classList.remove('hidden');

console.error(error);

}

btn.disabled=false;
btn.innerHTML='บันทึกข้อมูล';

});

</script>

</body>
</html>
