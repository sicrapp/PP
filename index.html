<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>แบบประเมินความพึงพอใจ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Kanit', sans-serif;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-orange-50 to-amber-100 min-h-screen py-8 px-4 text-slate-700">

  <div class="max-w-2xl mx-auto bg-white rounded-3xl shadow-xl border-4 border-orange-200 overflow-hidden transform transition duration-300 hover:scale-[1.01]">
    
    <div class="bg-gradient-to-r from-orange-400 to-amber-500 p-6 text-center text-white relative">
      <div class="absolute top-2 right-4 text-4xl opacity-20">🫁❤️</div>
      <h1 class="text-2xl font-semibold tracking-wide">แบบประเมินความพึงพอใจ</h1>
      <p class="text-orange-50 text-sm mt-1">สาขาเวชศาสตร์ฟื้นฟูหัวใจและปอด</p>
    </div>

    <form id="surveyForm" onsubmit="handleFormSubmit(event)" class="p-6 space-y-6">
      
      <div class="bg-orange-50 rounded-2xl p-4 border border-orange-100 text-xs text-orange-800 leading-relaxed">
        <strong>💡 คำชี้แจง:</strong> โปรดเลือกทำเครื่องหมายลงในช่องระดับความพึงพอใจที่ตรงกับความคิดเห็นของท่านมากที่สุด เพื่อนำข้อมูลไปปรับปรุงการให้บริการต่อไป
      </div>

      <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 space-y-3">
        <label class="block font-medium text-slate-800">1. การสื่อสารและการประสานงาน <span class="text-red-500">*</span></label>
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-2">
          <label class="flex items-center justify-center p-3 bg-white rounded-xl border border-slate-200 cursor-pointer transition hover:bg-orange-50 hover:border-orange-300">
            <input type="radio" name="communication" value="ดีเยี่ยม" class="accent-orange-500 mr-2" required> 😄 ดีเยี่ยม
          </label>
          <label class="flex items-center justify-center p-3 bg-white rounded-xl border border-slate-200 cursor-pointer transition hover:bg-orange-50 hover:border-orange-300">
            <input type="radio" name="communication" value="ดี" class="accent-orange-500 mr-2"> 🙂 ดี
          </label>
          <label class="flex items-center justify-center p-3 bg-white rounded-xl border border-slate-200 cursor-pointer transition hover:bg-orange-50 hover:border-orange-300">
            <input type="radio" name="communication" value="พอใช้" class="accent-orange-500 mr-2"> 😐 พอใช้
          </label>
          <label class="flex items-center justify-center p-3 bg-white rounded-xl border border-slate-200 cursor-pointer transition hover:bg-orange-50 hover:border-orange-300">
            <input type="radio" name="communication" value="ควรปรับปรุง" class="accent-orange-500 mr-2"> 🙁 ปรับปรุง
          </label>
        </div>
      </div>

      <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 space-y-3">
        <label class="block font-medium text-slate-800">2. เจ้าหน้าที่เอาใจใส่ เต็มใจให้บริการ <span class="text-red-500">*</span></label>
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-2">
          <label class="flex items-center justify-center p-3 bg-white rounded-xl border border-slate-200 cursor-pointer transition hover:bg-orange-50 hover:border-orange-300">
            <input type="radio" name="attentiveness" value="ดีเยี่ยม" class="accent-orange-500 mr-2" required> 😄 ดีเยี่ยม
          </label>
          <label class="flex items-center justify-center p-3 bg-white rounded-xl border border-slate-200 cursor-pointer transition hover:bg-orange-50 hover:border-orange-300">
            <input type="radio" name="attentiveness" value="ดี" class="accent-orange-500 mr-2"> 🙂 ดี
          </label>
          <label class="flex items-center justify-center p-3 bg-white rounded-xl border border-slate-200 cursor-pointer transition hover:bg-orange-50 hover:border-orange-300">
            <input type="radio" name="attentiveness" value="พอใช้" class="accent-orange-500 mr-2"> 😐 พอใช้
          </label>
          <label class="flex items-center justify-center p-3 bg-white rounded-xl border border-slate-200 cursor-pointer transition hover:bg-orange-50 hover:border-orange-300">
            <input type="radio" name="attentiveness" value="ควรปรับปรุง" class="accent-orange-500 mr-2"> 🙁 ปรับปรุง
          </label>
        </div>
      </div>

      <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 space-y-3">
        <label class="block font-medium text-slate-800">3. เจ้าหน้าที่พูดจาสุภาพ ยิ้มแย้มแจ่มใส <span class="text-red-500">*</span></label>
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-2">
          <label class="flex items-center justify-center p-3 bg-white rounded-xl border border-slate-200 cursor-pointer transition hover:bg-orange-50 hover:border-orange-300">
            <input type="radio" name="politeness" value="ดีเยี่ยม" class="accent-orange-500 mr-2" required> 😄 ดีเยี่ยม
          </label>
          <label class="flex items-center justify-center p-3 bg-white rounded-xl border border-slate-200 cursor-pointer transition hover:bg-orange-50 hover:border-orange-300">
            <input type="radio" name="politeness" value="ดี" class="accent-orange-500 mr-2"> 🙂 ดี
          </label>
          <label class="flex items-center justify-center p-3 bg-white rounded-xl border border-slate-200 cursor-pointer transition hover:bg-orange-50 hover:border-orange-300">
            <input type="radio" name="politeness" value="พอใช้" class="accent-orange-500 mr-2"> 😐 พอใช้
          </label>
          <label class="flex items-center justify-center p-3 bg-white rounded-xl border border-slate-200 cursor-pointer transition hover:bg-orange-50 hover:border-orange-300">
            <input type="radio" name="politeness" value="ควรปรับปรุง" class="accent-orange-500 mr-2"> 🙁 ปรับปรุง
          </label>
        </div>
      </div>

      <div class="bg-orange-50 p-4 rounded-2xl border-2 border-orange-200 space-y-3">
        <label class="block font-semibold text-orange-900 text-lg">4. ความพึงพอใจโดยรวม <span class="text-red-500">*</span></label>
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-2">
          <label class="flex items-center justify-center p-3 bg-white rounded-xl border-2 border-orange-100 cursor-pointer transition hover:bg-orange-100 hover:border-orange-400">
            <input type="radio" name="overall" value="ดีเยี่ยม" class="accent-orange-600 mr-2" required> 🥰 ดีเยี่ยม
          </label>
          <label class="flex items-center justify-center p-3 bg-white rounded-xl border-2 border-orange-100 cursor-pointer transition hover:bg-orange-100 hover:border-orange-400">
            <input type="radio" name="overall" value="ดี" class="accent-orange-600 mr-2"> 😊 ดี
          </label>
          <label class="flex items-center justify-center p-3 bg-white rounded-xl border-2 border-orange-100 cursor-pointer transition hover:bg-orange-100 hover:border-orange-400">
            <input type="radio" name="overall" value="พอใช้" class="accent-orange-600 mr-2"> 😐 พอใช้
          </label>
          <label class="flex items-center justify-center p-3 bg-white rounded-xl border-2 border-orange-100 cursor-pointer transition hover:bg-orange-100 hover:border-orange-400">
            <input type="radio" name="overall" value="ควรปรับปรุง" class="accent-orange-600 mr-2"> 😞 ปรับปรุง
          </label>
        </div>
      </div>

      <div class="space-y-2">
        <label class="block font-medium text-slate-700">ข้อเสนอแนะเพิ่มเติม</label>
        <textarea name="suggestion" rows="3" class="w-full p-3 rounded-2xl border-2 border-slate-200 focus:border-orange-400 focus:outline-none transition resize-none" placeholder="พิมพ์ข้อเสนอแนะของคุณที่นี่..."></textarea>
      </div>

      <div class="space-y-2">
        <label class="block font-medium text-slate-700">ข้อควรปรับปรุง</label>
        <textarea name="improvement" rows="3" class="w-full p-3 rounded-2xl border-2 border-slate-200 focus:border-orange-400 focus:outline-none transition resize-none" placeholder="พิมพ์ข้อที่ต้องการให้เราปรับปรุง..."></textarea>
      </div>

      <div class="pt-2">
        <button type="submit" id="submitBtn" class="w-full bg-gradient-to-r from-orange-500 to-amber-500 text-white font-medium py-4 px-6 rounded-2xl shadow-lg hover:shadow-orange-200 hover:from-orange-600 hover:to-amber-600 transition-all duration-150 transform active:scale-95 flex items-center justify-center">
          <span id="btnText">ส่งแบบประเมิน ✨</span>
          <span id="spinner" class="hidden animate-spin rounded-full h-5 w-5 border-2 border-white border-t-transparent ml-2"></span>
        </button>
      </div>

    </form>

    <div id="statusPopup" class="hidden p-6 text-center space-y-4">
      <div id="statusIcon" class="text-6xl"></div>
      <h2 id="statusTitle" class="text-2xl font-semibold"></h2>
      <p id="statusMessage" class="text-slate-500 max-w-sm mx-auto"></p>
      <button onclick="resetSurveyForm()" class="mt-4 bg-slate-100 text-slate-700 py-2 px-6 rounded-xl hover:bg-slate-200 transition">
        ทำแบบประเมินอีกครั้ง
      </button>
    </div>

  </div>

  <script>
    function handleFormSubmit(event) {
      event.preventDefault();
      
      const form = document.getElementById('surveyForm');
      const submitBtn = document.getElementById('submitBtn');
      const btnText = document.getElementById('btnText');
      const spinner = document.getElementById('spinner');
      
      // แสดงสถานะกำลังโหลด
      submitBtn.disabled = true;
      btnText.innerText = 'กำลังส่งข้อมูล...';
      spinner.classList.remove('hidden');
      
      // แปลงข้อมูลฟอร์มเป็น Object
      const formData = {
        communication: form.communication.value,
        attentiveness: form.attentiveness.value,
        politeness: form.politeness.value,
        overall: form.overall.value,
        suggestion: form.suggestion.value,
        improvement: form.improvement.value
      };
      
      // ส่งข้อมูลไปยังฝั่ง Server (Google Apps Script)
      google.script.run
        .withSuccessHandler(onSuccess)
        .withFailureHandler(onFailure)
        .submitForm(formData);
    }
    
    function onSuccess(response) {
      const form = document.getElementById('surveyForm');
      const statusPopup = document.getElementById('statusPopup');
      
      form.classList.add('hidden');
      statusPopup.classList.remove('hidden');
      
      if(response.success) {
        document.getElementById('statusIcon').innerText = '🎉';
        document.getElementById('statusTitle').innerText = 'บันทึกสำเร็จ!';
        document.getElementById('statusTitle').className = 'text-2xl font-semibold text-emerald-600';
        document.getElementById('statusMessage').innerText = response.message;
        form.reset(); // ล้างฟอร์มหลังจากส่งสำเร็จ
      } else {
        showError(response.message);
      }
    }
    
    function onFailure(error) {
      showError(error.toString());
    }
    
    function showError(msg) {
      const form = document.getElementById('surveyForm');
      const statusPopup = document.getElementById('statusPopup');
      
      form.classList.add('hidden');
      statusPopup.classList.remove('hidden');
      
      document.getElementById('statusIcon').innerText = '❌';
      document.getElementById('statusTitle').innerText = 'เกิดข้อผิดพลาด';
      document.getElementById('statusTitle').className = 'text-2xl font-semibold text-red-600';
      document.getElementById('statusMessage').innerText = msg;
    }
    
    function resetSurveyForm() {
      const form = document.getElementById('surveyForm');
      const statusPopup = document.getElementById('statusPopup');
      const submitBtn = document.getElementById('submitBtn');
      const btnText = document.getElementById('btnText');
      const spinner = document.getElementById('spinner');
      
      statusPopup.classList.add('hidden');
      form.classList.remove('hidden');
      
      // รีเซ็ตปุ่มส่งข้อมูลกลับมาปกติ
      submitBtn.disabled = false;
      btnText.innerText = 'ส่งแบบประเมิน ✨';
      spinner.classList.add('hidden');
    }
  </script>
</body>
</html>
