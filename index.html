<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบประเมินความพึงพอใจ</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Kanit -->
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; }
        
        /* Custom scrollbar for textareas */
        textarea::-webkit-scrollbar { width: 8px; }
        textarea::-webkit-scrollbar-track { background: #fff7ed; border-radius: 8px; }
        textarea::-webkit-scrollbar-thumb { background: #fdba74; border-radius: 8px; }
        textarea::-webkit-scrollbar-thumb:hover { background: #f97316; }

        /* Animation for radio buttons */
        .radio-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .radio-input:checked + .radio-card {
            transform: scale(1.05);
            box-shadow: 0 10px 15px -3px rgba(234, 88, 12, 0.2), 0 4px 6px -2px rgba(234, 88, 12, 0.1);
        }
        
        /* Floating decoration animation */
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        .animate-float { animation: float 4s ease-in-out infinite; }
        .animate-float-delayed { animation: float 5s ease-in-out infinite; animation-delay: 2s; }
    </style>
</head>
<body class="bg-gradient-to-br from-orange-50 via-orange-100 to-yellow-100 min-h-screen relative overflow-x-hidden text-slate-800">

    <!-- Decorative Elements Background -->
    <div class="fixed top-10 left-10 text-6xl opacity-20 animate-float pointer-events-none z-0">🎈</div>
    <div class="fixed bottom-20 right-10 text-6xl opacity-20 animate-float-delayed pointer-events-none z-0">✨</div>
    <div class="fixed top-40 right-20 text-5xl opacity-20 animate-float pointer-events-none z-0" style="animation-duration: 6s;">🌟</div>

    <div class="container mx-auto px-4 py-8 relative z-10 max-w-3xl">
        
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="inline-block bg-white p-4 rounded-full shadow-lg mb-4">
                <svg class="w-12 h-12 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
            </div>
            <h1 class="text-3xl md:text-4xl font-bold text-orange-600 mb-2 drop-shadow-sm">แบบประเมินความพึงพอใจ</h1>
            <p class="text-lg text-orange-800 font-medium bg-white/50 inline-block px-4 py-1 rounded-full">สาขาเวชศาสตร์ฟื้นฟูหัวใจและปอด</p>
        </div>

        <!-- Main Form Card -->
        <form id="surveyForm" onsubmit="submitForm(event)" class="bg-white/90 backdrop-blur-sm rounded-3xl shadow-xl p-6 md:p-8 border-4 border-white">
            
            <!-- Question 1 -->
            <div class="mb-8">
                <label class="block text-lg font-semibold text-slate-700 mb-3">1. การสื่อสารและการประสานงาน <span class="text-red-500">*</span></label>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                    <label class="cursor-pointer">
                        <input type="radio" name="q1" value="ดีเยี่ยม" class="radio-input peer sr-only" required>
                        <div class="radio-card border-2 border-orange-100 bg-orange-50/50 rounded-2xl p-4 text-center peer-checked:border-orange-500 peer-checked:bg-orange-100 hover:bg-orange-100">
                            <div class="text-3xl mb-2">😍</div>
                            <div class="font-medium text-orange-900 text-sm md:text-base">ดีเยี่ยม</div>
                        </div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="q1" value="ดี" class="radio-input peer sr-only">
                        <div class="radio-card border-2 border-orange-100 bg-orange-50/50 rounded-2xl p-4 text-center peer-checked:border-orange-500 peer-checked:bg-orange-100 hover:bg-orange-100">
                            <div class="text-3xl mb-2">😊</div>
                            <div class="font-medium text-orange-900 text-sm md:text-base">ดี</div>
                        </div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="q1" value="พอใช้" class="radio-input peer sr-only">
                        <div class="radio-card border-2 border-orange-100 bg-orange-50/50 rounded-2xl p-4 text-center peer-checked:border-orange-500 peer-checked:bg-orange-100 hover:bg-orange-100">
                            <div class="text-3xl mb-2">🙂</div>
                            <div class="font-medium text-orange-900 text-sm md:text-base">พอใช้</div>
                        </div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="q1" value="ควรปรับปรุง" class="radio-input peer sr-only">
                        <div class="radio-card border-2 border-orange-100 bg-orange-50/50 rounded-2xl p-4 text-center peer-checked:border-orange-500 peer-checked:bg-orange-100 hover:bg-orange-100">
                            <div class="text-3xl mb-2">😔</div>
                            <div class="font-medium text-orange-900 text-sm md:text-base">ควรปรับปรุง</div>
                        </div>
                    </label>
                </div>
            </div>

            <!-- Question 2 -->
            <div class="mb-8">
                <label class="block text-lg font-semibold text-slate-700 mb-3">2. เจ้าหน้าที่เอาใจใส่ เต็มใจให้บริการ <span class="text-red-500">*</span></label>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                    <label class="cursor-pointer"><input type="radio" name="q2" value="ดีเยี่ยม" class="radio-input peer sr-only" required><div class="radio-card border-2 border-orange-100 bg-orange-50/50 rounded-2xl p-4 text-center peer-checked:border-orange-500 peer-checked:bg-orange-100 hover:bg-orange-100"><div class="text-3xl mb-2">😍</div><div class="font-medium text-orange-900 text-sm md:text-base">ดีเยี่ยม</div></div></label>
                    <label class="cursor-pointer"><input type="radio" name="q2" value="ดี" class="radio-input peer sr-only"><div class="radio-card border-2 border-orange-100 bg-orange-50/50 rounded-2xl p-4 text-center peer-checked:border-orange-500 peer-checked:bg-orange-100 hover:bg-orange-100"><div class="text-3xl mb-2">😊</div><div class="font-medium text-orange-900 text-sm md:text-base">ดี</div></div></label>
                    <label class="cursor-pointer"><input type="radio" name="q2" value="พอใช้" class="radio-input peer sr-only"><div class="radio-card border-2 border-orange-100 bg-orange-50/50 rounded-2xl p-4 text-center peer-checked:border-orange-500 peer-checked:bg-orange-100 hover:bg-orange-100"><div class="text-3xl mb-2">🙂</div><div class="font-medium text-orange-900 text-sm md:text-base">พอใช้</div></div></label>
                    <label class="cursor-pointer"><input type="radio" name="q2" value="ควรปรับปรุง" class="radio-input peer sr-only"><div class="radio-card border-2 border-orange-100 bg-orange-50/50 rounded-2xl p-4 text-center peer-checked:border-orange-500 peer-checked:bg-orange-100 hover:bg-orange-100"><div class="text-3xl mb-2">😔</div><div class="font-medium text-orange-900 text-sm md:text-base">ควรปรับปรุง</div></div></label>
                </div>
            </div>

            <!-- Question 3 -->
            <div class="mb-8">
                <label class="block text-lg font-semibold text-slate-700 mb-3">3. เจ้าหน้าที่พูดจาสุภาพ ยิ้มแย้มแจ่มใส <span class="text-red-500">*</span></label>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                    <label class="cursor-pointer"><input type="radio" name="q3" value="ดีเยี่ยม" class="radio-input peer sr-only" required><div class="radio-card border-2 border-orange-100 bg-orange-50/50 rounded-2xl p-4 text-center peer-checked:border-orange-500 peer-checked:bg-orange-100 hover:bg-orange-100"><div class="text-3xl mb-2">😍</div><div class="font-medium text-orange-900 text-sm md:text-base">ดีเยี่ยม</div></div></label>
                    <label class="cursor-pointer"><input type="radio" name="q3" value="ดี" class="radio-input peer sr-only"><div class="radio-card border-2 border-orange-100 bg-orange-50/50 rounded-2xl p-4 text-center peer-checked:border-orange-500 peer-checked:bg-orange-100 hover:bg-orange-100"><div class="text-3xl mb-2">😊</div><div class="font-medium text-orange-900 text-sm md:text-base">ดี</div></div></label>
                    <label class="cursor-pointer"><input type="radio" name="q3" value="พอใช้" class="radio-input peer sr-only"><div class="radio-card border-2 border-orange-100 bg-orange-50/50 rounded-2xl p-4 text-center peer-checked:border-orange-500 peer-checked:bg-orange-100 hover:bg-orange-100"><div class="text-3xl mb-2">🙂</div><div class="font-medium text-orange-900 text-sm md:text-base">พอใช้</div></div></label>
                    <label class="cursor-pointer"><input type="radio" name="q3" value="ควรปรับปรุง" class="radio-input peer sr-only"><div class="radio-card border-2 border-orange-100 bg-orange-50/50 rounded-2xl p-4 text-center peer-checked:border-orange-500 peer-checked:bg-orange-100 hover:bg-orange-100"><div class="text-3xl mb-2">😔</div><div class="font-medium text-orange-900 text-sm md:text-base">ควรปรับปรุง</div></div></label>
                </div>
            </div>

            <!-- Question 4 -->
            <div class="mb-8">
                <label class="block text-lg font-semibold text-slate-700 mb-3">4. ความพึงพอใจโดยรวม <span class="text-red-500">*</span></label>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                    <label class="cursor-pointer"><input type="radio" name="q4" value="ดีเยี่ยม" class="radio-input peer sr-only" required><div class="radio-card border-2 border-orange-100 bg-orange-50/50 rounded-2xl p-4 text-center peer-checked:border-orange-500 peer-checked:bg-orange-100 hover:bg-orange-100"><div class="text-3xl mb-2">😍</div><div class="font-medium text-orange-900 text-sm md:text-base">ดีเยี่ยม</div></div></label>
                    <label class="cursor-pointer"><input type="radio" name="q4" value="ดี" class="radio-input peer sr-only"><div class="radio-card border-2 border-orange-100 bg-orange-50/50 rounded-2xl p-4 text-center peer-checked:border-orange-500 peer-checked:bg-orange-100 hover:bg-orange-100"><div class="text-3xl mb-2">😊</div><div class="font-medium text-orange-900 text-sm md:text-base">ดี</div></div></label>
                    <label class="cursor-pointer"><input type="radio" name="q4" value="พอใช้" class="radio-input peer sr-only"><div class="radio-card border-2 border-orange-100 bg-orange-50/50 rounded-2xl p-4 text-center peer-checked:border-orange-500 peer-checked:bg-orange-100 hover:bg-orange-100"><div class="text-3xl mb-2">🙂</div><div class="font-medium text-orange-900 text-sm md:text-base">พอใช้</div></div></label>
                    <label class="cursor-pointer"><input type="radio" name="q4" value="ควรปรับปรุง" class="radio-input peer sr-only"><div class="radio-card border-2 border-orange-100 bg-orange-50/50 rounded-2xl p-4 text-center peer-checked:border-orange-500 peer-checked:bg-orange-100 hover:bg-orange-100"><div class="text-3xl mb-2">😔</div><div class="font-medium text-orange-900 text-sm md:text-base">ควรปรับปรุง</div></div></label>
                </div>
            </div>

            <!-- Textareas -->
            <div class="space-y-6 mb-8">
                <div>
                    <label for="suggestion" class="block text-lg font-semibold text-slate-700 mb-2">5. ข้อเสนอแนะ (ถ้ามี)</label>
                    <textarea id="suggestion" name="suggestion" rows="3" class="w-full px-4 py-3 rounded-2xl border-2 border-orange-200 focus:border-orange-500 focus:ring focus:ring-orange-200 focus:ring-opacity-50 transition-colors bg-orange-50/30" placeholder="พิมพ์ข้อเสนอแนะของคุณที่นี่..."></textarea>
                </div>
                <div>
                    <label for="improvement" class="block text-lg font-semibold text-slate-700 mb-2">6. ข้อควรปรับปรุง (ถ้ามี)</label>
                    <textarea id="improvement" name="improvement" rows="3" class="w-full px-4 py-3 rounded-2xl border-2 border-orange-200 focus:border-orange-500 focus:ring focus:ring-orange-200 focus:ring-opacity-50 transition-colors bg-orange-50/30" placeholder="พิมพ์สิ่งที่ต้องการให้เราปรับปรุง..."></textarea>
                </div>
            </div>

            <!-- Submit Button -->
            <div class="text-center">
                <button type="submit" id="submitBtn" class="bg-gradient-to-r from-orange-500 to-orange-600 hover:from-orange-600 hover:to-orange-700 text-white font-bold py-4 px-12 rounded-full shadow-lg hover:shadow-xl transform hover:-translate-y-1 transition-all duration-200 flex items-center justify-center w-full md:w-auto md:mx-auto text-lg">
                    <svg id="btnSpinner" class="animate-spin -ml-1 mr-3 h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span id="btnText">ส่งแบบประเมิน 🎉</span>
                </button>
            </div>
        </form>

        <!-- Footer -->
        <p class="text-center text-orange-800/60 mt-8 text-sm">ขอบคุณที่ร่วมเป็นส่วนหนึ่งในการพัฒนาบริการของเรา</p>
    </div>

    <!-- Success Modal Overlay -->
    <div id="resultModal" class="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50 hidden opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full mx-4 shadow-2xl transform scale-90 transition-transform duration-300" id="modalContent">
            <div class="text-center">
                <div id="modalIcon" class="text-6xl mb-4">✅</div>
                <h3 id="modalTitle" class="text-2xl font-bold text-slate-800 mb-2">สำเร็จ!</h3>
                <p id="modalMessage" class="text-slate-600 mb-6">บันทึกข้อมูลของคุณเรียบร้อยแล้ว</p>
                <button onclick="closeModal()" class="bg-orange-100 text-orange-700 hover:bg-orange-200 font-semibold py-2 px-6 rounded-full w-full transition-colors">ปิดหน้าต่าง</button>
            </div>
        </div>
    </div>

    <script>
        function submitForm(event) {
            event.preventDefault();
            
            const form = document.getElementById('surveyForm');
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');

            // Form validation check
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            // Gather data
            const formData = new FormData(form);
            const data = {
                q1: formData.get('q1'),
                q2: formData.get('q2'),
                q3: formData.get('q3'),
                q4: formData.get('q4'),
                suggestion: formData.get('suggestion') || '',
                improvement: formData.get('improvement') || ''
            };

            // Set loading state
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-75', 'cursor-not-allowed', 'scale-95');
            btnText.textContent = 'กำลังบันทึกข้อมูล...';
            btnSpinner.classList.remove('hidden');

            // --- ใส่ Web App URL ของคุณเรียบร้อยแล้ว ---
            const scriptURL = 'https://script.google.com/macros/s/AKfycbzR_Cz-i0pI48yu4Tglq0MavDEXQFO3lM-uhw49SoTcxZM42TGVSc3f3QkgIoKdjrFdHQ/exec'; 

            fetch(scriptURL, {
                method: 'POST',
                // ใช้ text/plain เพื่อเลี่ยงปัญหา CORS Preflight
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(result => {
                handleResult(result.success, result.message || 'บันทึกข้อมูลเรียบร้อยแล้ว ขอบคุณสำหรับคำติชมครับ/ค่ะ 😊', form, submitBtn, btnText, btnSpinner);
            })
            .catch(error => {
                console.error('Error!', error.message);
                handleResult(false, 'เกิดข้อผิดพลาดในการเชื่อมต่อ กรุณาลองใหม่อีกครั้ง', form, submitBtn, btnText, btnSpinner);
            });
        }

        function handleResult(isSuccess, message, form, submitBtn, btnText, btnSpinner) {
            // Reset button state
            submitBtn.disabled = false;
            submitBtn.classList.remove('opacity-75', 'cursor-not-allowed', 'scale-95');
            btnText.textContent = 'ส่งแบบประเมิน 🎉';
            btnSpinner.classList.add('hidden');

            // Setup and show modal
            const modal = document.getElementById('resultModal');
            const modalContent = document.getElementById('modalContent');
            const modalIcon = document.getElementById('modalIcon');
            const modalTitle = document.getElementById('modalTitle');
            const modalMessage = document.getElementById('modalMessage');

            modalMessage.textContent = message;

            if (isSuccess) {
                modalIcon.textContent = '🎉';
                modalTitle.textContent = 'ขอบคุณครับ/ค่ะ!';
                modalTitle.className = 'text-2xl font-bold text-orange-500 mb-2';
                form.reset(); // Clear form on success
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                modalIcon.textContent = '❌';
                modalTitle.textContent = 'เกิดข้อผิดพลาด';
                modalTitle.className = 'text-2xl font-bold text-red-500 mb-2';
            }

            modal.classList.remove('hidden');
            // Trigger reflow for animation
            void modal.offsetWidth; 
            modal.classList.remove('opacity-0');
            modalContent.classList.remove('scale-90');
            modalContent.classList.add('scale-100');
        }

        function closeModal() {
            const modal = document.getElementById('resultModal');
            const modalContent = document.getElementById('modalContent');
            
            modal.classList.add('opacity-0');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-90');
            
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300); // Wait for transition to finish
        }
    </script>
</body>
</html>
