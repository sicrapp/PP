<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>แบบประเมินความพึงพอใจ</title>
  
  <!-- นำเข้า Google Fonts: Kanit เพื่อให้ได้อารมณ์สนุกสนาน อ่านง่าย -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- นำเข้า Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- ตั้งค่า Tailwind -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Kanit', 'sans-serif'],
          },
          colors: {
            brand: {
              100: '#ffe4e6',
              500: '#f43f5e',
              600: '#e11d48',
              800: '#9f1239',
              900: '#881337',
            }
          }
        }
      }
    }
  </script>

  <style>
    /* Custom Styles เพื่อเพิ่มความ Playful */
    body {
      background-color: #ffe4e6;
      background-image: radial-gradient(#fecdd3 2px, transparent 2px);
      background-size: 30px 30px;
    }
    .playful-card {
      box-shadow: 8px 8px 0px 0px #e11d48;
      border: 4px solid #9f1239;
    }
    .playful-btn {
      box-shadow: 4px 4px 0px 0px #881337;
      transition: all 0.1s ease;
    }
    .playful-btn:active:not(:disabled) {
      box-shadow: 0px 0px 0px 0px #881337;
      transform: translateY(4px) translateX(4px);
    }
    .playful-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }
    /* ซ่อน scrollbar สำหรับ textarea */
    textarea::-webkit-scrollbar {
      width: 8px;
    }
    textarea::-webkit-scrollbar-thumb {
      background-color: #fca5a5;
      border-radius: 4px;
    }
  </style>
</head>
<body class="min-h-screen py-10 px-4 md:px-0 flex items-center justify-center">

  <div class="max-w-2xl w-full bg-white rounded-3xl p-6 md:p-10 playful-card relative overflow-hidden">
    
    <!-- แถบตกแต่งด้านบน -->
    <div class="absolute top-0 left-0 w-full h-4 bg-brand-500"></div>

    <div class="text-center mb-8 mt-2">
      <div class="inline-block bg-brand-100 text-brand-800 rounded-full px-4 py-1 font-semibold text-sm mb-3 border-2 border-brand-500">
        📝 แบบประเมิน
      </div>
      <h1 class="text-2xl md:text-3xl font-bold text-brand-900 leading-tight">
        แบบประเมินความพึงพอใจในการให้บริการ<br>
        <span class="text-brand-600 text-xl md:text-2xl">สาขาเวชศาสตร์ฟื้นฟูหัวใจและปอด</span>
      </h1>
      <p class="text-gray-500 mt-2 text-sm md:text-base">ความคิดเห็นของท่านเป็นประโยชน์อย่างยิ่งในการพัฒนาการบริการของเรา</p>
    </div>

    <!-- ฟอร์มประเมิน -->
    <form id="evaluationForm" onsubmit="handleFormSubmit(event)" class="space-y-8">
      
      <!-- ข้อ 1 -->
      <div class="space-y-3">
        <label class="block font-semibold text-brand-900 text-lg">1. การสื่อสารและการประสานงาน <span class="text-red-500">*</span></label>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
          <label class="cursor-pointer">
            <input type="radio" name="q1" value="ดีเยี่ยม" required class="peer sr-only">
            <div class="text-center p-3 rounded-xl border-2 border-brand-100 peer-checked:border-brand-500 peer-checked:bg-brand-500 peer-checked:text-white transition-all bg-gray-50 text-gray-700 font-medium hover:bg-brand-50">😍 ดีเยี่ยม</div>
          </label>
          <label class="cursor-pointer">
            <input type="radio" name="q1" value="ดี" class="peer sr-only">
            <div class="text-center p-3 rounded-xl border-2 border-brand-100 peer-checked:border-brand-500 peer-checked:bg-brand-500 peer-checked:text-white transition-all bg-gray-50 text-gray-700 font-medium hover:bg-brand-50">😊 ดี</div>
          </label>
          <label class="cursor-pointer">
            <input type="radio" name="q1" value="พอใช้" class="peer sr-only">
            <div class="text-center p-3 rounded-xl border-2 border-brand-100 peer-checked:border-yellow-500 peer-checked:bg-yellow-500 peer-checked:text-white transition-all bg-gray-50 text-gray-700 font-medium hover:bg-yellow-50">😐 พอใช้</div>
          </label>
          <label class="cursor-pointer">
            <input type="radio" name="q1" value="ควรปรับปรุง" class="peer sr-only">
            <div class="text-center p-3 rounded-xl border-2 border-brand-100 peer-checked:border-gray-500 peer-checked:bg-gray-500 peer-checked:text-white transition-all bg-gray-50 text-gray-700 font-medium hover:bg-gray-200">😔 ควรปรับปรุง</div>
          </label>
        </div>
      </div>

      <!-- ข้อ 2 -->
      <div class="space-y-3">
        <label class="block font-semibold text-brand-900 text-lg">2. เจ้าหน้าที่เอาใจใส่ เต็มใจให้บริการ <span class="text-red-500">*</span></label>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
          <label class="cursor-pointer">
            <input type="radio" name="q2" value="ดีเยี่ยม" required class="peer sr-only">
            <div class="text-center p-3 rounded-xl border-2 border-brand-100 peer-checked:border-brand-500 peer-checked:bg-brand-500 peer-checked:text-white transition-all bg-gray-50 text-gray-700 font-medium hover:bg-brand-50">😍 ดีเยี่ยม</div>
          </label>
          <label class="cursor-pointer">
            <input type="radio" name="q2" value="ดี" class="peer sr-only">
            <div class="text-center p-3 rounded-xl border-2 border-brand-100 peer-checked:border-brand-500 peer-checked:bg-brand-500 peer-checked:text-white transition-all bg-gray-50 text-gray-700 font-medium hover:bg-brand-50">😊 ดี</div>
          </label>
          <label class="cursor-pointer">
            <input type="radio" name="q2" value="พอใช้" class="peer sr-only">
            <div class="text-center p-3 rounded-xl border-2 border-brand-100 peer-checked:border-yellow-500 peer-checked:bg-yellow-500 peer-checked:text-white transition-all bg-gray-50 text-gray-700 font-medium hover:bg-yellow-50">😐 พอใช้</div>
          </label>
          <label class="cursor-pointer">
            <input type="radio" name="q2" value="ควรปรับปรุง" class="peer sr-only">
            <div class="text-center p-3 rounded-xl border-2 border-brand-100 peer-checked:border-gray-500 peer-checked:bg-gray-500 peer-checked:text-white transition-all bg-gray-50 text-gray-700 font-medium hover:bg-gray-200">😔 ควรปรับปรุง</div>
          </label>
        </div>
      </div>

      <!-- ข้อ 3 -->
      <div class="space-y-3">
        <label class="block font-semibold text-brand-900 text-lg">3. เจ้าหน้าที่พูดจาสุภาพ ยิ้มแย้มแจ่มใส <span class="text-red-500">*</span></label>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
          <label class="cursor-pointer">
            <input type="radio" name="q3" value="ดีเยี่ยม" required class="peer sr-only">
            <div class="text-center p-3 rounded-xl border-2 border-brand-100 peer-checked:border-brand-500 peer-checked:bg-brand-500 peer-checked:text-white transition-all bg-gray-50 text-gray-700 font-medium hover:bg-brand-50">😍 ดีเยี่ยม</div>
          </label>
          <label class="cursor-pointer">
            <input type="radio" name="q3" value="ดี" class="peer sr-only">
            <div class="text-center p-3 rounded-xl border-2 border-brand-100 peer-checked:border-brand-500 peer-checked:bg-brand-500 peer-checked:text-white transition-all bg-gray-50 text-gray-700 font-medium hover:bg-brand-50">😊 ดี</div>
          </label>
          <label class="cursor-pointer">
            <input type="radio" name="q3" value="พอใช้" class="peer sr-only">
            <div class="text-center p-3 rounded-xl border-2 border-brand-100 peer-checked:border-yellow-500 peer-checked:bg-yellow-500 peer-checked:text-white transition-all bg-gray-50 text-gray-700 font-medium hover:bg-yellow-50">😐 พอใช้</div>
          </label>
          <label class="cursor-pointer">
            <input type="radio" name="q3" value="ควรปรับปรุง" class="peer sr-only">
            <div class="text-center p-3 rounded-xl border-2 border-brand-100 peer-checked:border-gray-500 peer-checked:bg-gray-500 peer-checked:text-white transition-all bg-gray-50 text-gray-700 font-medium hover:bg-gray-200">😔 ควรปรับปรุง</div>
          </label>
        </div>
      </div>

      <!-- ข้อ 4 -->
      <div class="space-y-3">
        <label class="block font-semibold text-brand-900 text-lg">4. ความพึงพอใจโดยรวม <span class="text-red-500">*</span></label>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
          <label class="cursor-pointer">
            <input type="radio" name="q4" value="ดีเยี่ยม" required class="peer sr-only">
            <div class="text-center p-3 rounded-xl border-2 border-brand-100 peer-checked:border-brand-500 peer-checked:bg-brand-500 peer-checked:text-white transition-all bg-gray-50 text-gray-700 font-medium hover:bg-brand-50">⭐ ดีเยี่ยม</div>
          </label>
          <label class="cursor-pointer">
            <input type="radio" name="q4" value="ดี" class="peer sr-only">
            <div class="text-center p-3 rounded-xl border-2 border-brand-100 peer-checked:border-brand-500 peer-checked:bg-brand-500 peer-checked:text-white transition-all bg-gray-50 text-gray-700 font-medium hover:bg-brand-50">⭐ ดี</div>
          </label>
          <label class="cursor-pointer">
            <input type="radio" name="q4" value="พอใช้" class="peer sr-only">
            <div class="text-center p-3 rounded-xl border-2 border-brand-100 peer-checked:border-yellow-500 peer-checked:bg-yellow-500 peer-checked:text-white transition-all bg-gray-50 text-gray-700 font-medium hover:bg-yellow-50">⭐ พอใช้</div>
          </label>
          <label class="cursor-pointer">
            <input type="radio" name="q4" value="ควรปรับปรุง" class="peer sr-only">
            <div class="text-center p-3 rounded-xl border-2 border-brand-100 peer-checked:border-gray-500 peer-checked:bg-gray-500 peer-checked:text-white transition-all bg-gray-50 text-gray-700 font-medium hover:bg-gray-200">⭐ ควรปรับปรุง</div>
          </label>
        </div>
      </div>

      <!-- ข้อ 5 และ 6 -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 pt-4 border-t-2 border-dashed border-red-200">
        <div class="space-y-2">
          <label for="q5" class="block font-semibold text-brand-900">ข้อเสนอแนะเพิ่มเติม</label>
          <textarea id="q5" name="q5" rows="3" class="w-full p-3 rounded-xl border-2 border-brand-200 focus:border-brand-500 focus:ring-0 outline-none transition-colors bg-brand-50" placeholder="พิมพ์ข้อเสนอแนะ..."></textarea>
        </div>
        <div class="space-y-2">
          <label for="q6" class="block font-semibold text-brand-900">ข้อควรปรับปรุง</label>
          <textarea id="q6" name="q6" rows="3" class="w-full p-3 rounded-xl border-2 border-brand-200 focus:border-brand-500 focus:ring-0 outline-none transition-colors bg-brand-50" placeholder="สิ่งที่ควรปรับปรุง..."></textarea>
        </div>
      </div>

      <!-- ปุ่ม Submit -->
      <div class="pt-4 text-center">
        <button type="submit" id="submitBtn" class="playful-btn bg-brand-500 hover:bg-brand-600 text-white font-bold text-lg py-4 px-10 rounded-full w-full md:w-auto flex items-center justify-center mx-auto border-2 border-brand-900">
          <span id="btnText">🚀 ส่งแบบประเมิน</span>
          <svg id="loadingSpinner" class="hidden animate-spin ml-3 h-6 w-6 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
        </button>
      </div>
    </form>
  </div>

  <!-- Modal แจ้งเตือน (Success / Error) -->
  <div id="alertModal" class="fixed inset-0 flex items-center justify-center bg-black bg-opacity-50 z-50 hidden opacity-0 transition-opacity duration-300 px-4">
    <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center playful-card transform scale-95 transition-transform duration-300" id="modalContent">
      <div id="modalIcon" class="text-6xl mb-4">✅</div>
      <h3 id="modalTitle" class="text-2xl font-bold text-brand-900 mb-2">สำเร็จ!</h3>
      <p id="modalMessage" class="text-gray-600 mb-6">บันทึกข้อมูลเรียบร้อยแล้ว</p>
      <button onclick="closeModal()" class="playful-btn bg-brand-100 hover:bg-brand-200 text-brand-900 font-bold py-3 px-8 rounded-full border-2 border-brand-800 w-full">
        ปิดหน้าต่าง
      </button>
    </div>
  </div>

  <!-- JavaScript ฝั่ง Client -->
  <script>
    const form = document.getElementById('evaluationForm');
    const submitBtn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    const loadingSpinner = document.getElementById('loadingSpinner');
    const alertModal = document.getElementById('alertModal');
    const modalContent = document.getElementById('modalContent');
    const modalIcon = document.getElementById('modalIcon');
    const modalTitle = document.getElementById('modalTitle');
    const modalMessage = document.getElementById('modalMessage');

    function handleFormSubmit(event) {
      event.preventDefault(); // ป้องกันการรีเฟรชหน้า

      // จัดการสถานะ Loading
      submitBtn.disabled = true;
      btnText.textContent = 'กำลังบันทึกข้อมูล...';
      loadingSpinner.classList.remove('hidden');

      // ดึงข้อมูลจาก Form แปลงเป็น Object
      const formData = new FormData(form);
      const data = Object.fromEntries(formData.entries());

      // เรียกใช้งานฟังก์ชัน submitForm ฝั่ง Server (Code.gs)
      google.script.run
        .withSuccessHandler(onSuccess)
        .withFailureHandler(onError)
        .submitForm(data);
    }

    function onSuccess(response) {
      // ยกเลิกสถานะ Loading
      resetButton();
      
      if(response.status === 'success') {
        form.reset(); // ล้างข้อมูลในฟอร์มเมื่อสำเร็จ
        showModal('✅', 'บันทึกสำเร็จ!', response.message, true);
      } else {
        showModal('❌', 'เกิดข้อผิดพลาด', response.message, false);
      }
    }

    function onError(error) {
      // ยกเลิกสถานะ Loading
      resetButton();
      showModal('❌', 'ข้อผิดพลาดระบบ', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้: ' + error.message, false);
    }

    function resetButton() {
      submitBtn.disabled = false;
      btnText.textContent = '🚀 ส่งแบบประเมิน';
      loadingSpinner.classList.add('hidden');
    }

    function showModal(icon, title, message, isSuccess) {
      modalIcon.textContent = icon;
      modalTitle.textContent = title;
      modalMessage.textContent = message;
      
      if(isSuccess) {
        modalTitle.classList.replace('text-red-600', 'text-brand-900');
      } else {
        modalTitle.classList.replace('text-brand-900', 'text-red-600');
      }

      alertModal.classList.remove('hidden');
      // หน่วงเวลาเล็กน้อยเพื่อให้ CSS Transition ทำงาน
      setTimeout(() => {
        alertModal.classList.remove('opacity-0');
        modalContent.classList.remove('scale-95');
        modalContent.classList.add('scale-100');
      }, 10);
    }

    function closeModal() {
      alertModal.classList.add('opacity-0');
      modalContent.classList.remove('scale-100');
      modalContent.classList.add('scale-95');
      
      setTimeout(() => {
        alertModal.classList.add('hidden');
      }, 300); // รอให้ Animation จบก่อนซ่อน
    }
  </script>
</body>
</html>
