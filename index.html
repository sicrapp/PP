<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>แบบประเมินความพึงพอใจ</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts: Kanit -->
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Kanit', sans-serif;
      /* พื้นหลังโทนส้ม Playful */
      background-color: #fff7ed;
      background-image: radial-gradient(#fdba74 1px, transparent 1px);
      background-size: 20px 20px;
    }
    
    /* ซ่อน Scrollbar แต่ยังเลื่อนได้ */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #fdba74; border-radius: 10px; }
    
    .question-card {
      transition: all 0.2s ease-in-out;
    }
    .question-card:hover {
      transform: translateY(-2px);
    }
  </style>
</head>
<body class="min-h-screen p-4 md:p-8 text-slate-700 flex justify-center items-start">

  <!-- Main Container -->
  <div class="w-full max-w-2xl bg-white rounded-[2rem] shadow-xl border-4 border-orange-200 overflow-hidden relative">
    
    <!-- Header -->
    <div class="bg-gradient-to-r from-orange-400 to-orange-500 p-6 md:p-8 text-white text-center relative overflow-hidden">
      <div class="absolute top-[-20px] left-[-20px] text-6xl opacity-20 transform -rotate-12">🫀</div>
      <div class="absolute bottom-[-10px] right-[-10px] text-5xl opacity-20 transform rotate-12">🫁</div>
      <h1 class="text-2xl md:text-3xl font-bold mb-2 relative z-10">แบบประเมินความพึงพอใจ</h1>
      <p class="text-orange-50 text-sm md:text-base relative z-10">สาขาเวชศาสตร์ฟื้นฟูหัวใจและปอด ✨</p>
    </div>

    <!-- Form -->
    <form id="surveyForm" onsubmit="submitForm(event)" class="p-6 md:p-8 space-y-8">
      
      <!-- ข้อ 1 -->
      <div class="question-card bg-orange-50 p-5 rounded-2xl border-2 border-orange-100">
        <label class="block text-lg font-medium text-orange-800 mb-3">
          1. การสื่อสารและการประสานงาน <span class="text-red-500">*</span>
        </label>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
          <label class="cursor-pointer">
            <input type="radio" name="q1" value="ดีเยี่ยม" class="peer sr-only" required>
            <div class="rounded-xl border-2 border-orange-200 bg-white py-2 text-center text-sm md:text-base peer-checked:bg-orange-500 peer-checked:text-white peer-checked:border-orange-500 hover:bg-orange-100 transition-all">ดีเยี่ยม 🤩</div>
          </label>
          <label class="cursor-pointer">
            <input type="radio" name="q1" value="ดี" class="peer sr-only">
            <div class="rounded-xl border-2 border-orange-200 bg-white py-2 text-center text-sm md:text-base peer-checked:bg-orange-500 peer-checked:text-white peer-checked:border-orange-500 hover:bg-orange-100 transition-all">ดี 🙂</div>
          </label>
          <label class="cursor-pointer">
            <input type="radio" name="q1" value="พอใช้" class="peer sr-only">
            <div class="rounded-xl border-2 border-orange-200 bg-white py-2 text-center text-sm md:text-base peer-checked:bg-orange-500 peer-checked:text-white peer-checked:border-orange-500 hover:bg-orange-100 transition-all">พอใช้ 😐</div>
          </label>
          <label class="cursor-pointer">
            <input type="radio" name="q1" value="ควรปรับปรุง" class="peer sr-only">
            <div class="rounded-xl border-2 border-orange-200 bg-white py-2 text-center text-sm md:text-base peer-checked:bg-orange-500 peer-checked:text-white peer-checked:border-orange-500 hover:bg-orange-100 transition-all">ควรปรับปรุง 😔</div>
          </label>
        </div>
      </div>

      <!-- ข้อ 2 -->
      <div class="question-card bg-orange-50 p-5 rounded-2xl border-2 border-orange-100">
        <label class="block text-lg font-medium text-orange-800 mb-3">
          2. เจ้าหน้าที่เอาใจใส่ เต็มใจให้บริการ <span class="text-red-500">*</span>
        </label>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
          <label class="cursor-pointer"><input type="radio" name="q2" value="ดีเยี่ยม" class="peer sr-only" required><div class="rounded-xl border-2 border-orange-200 bg-white py-2 text-center text-sm md:text-base peer-checked:bg-orange-500 peer-checked:text-white peer-checked:border-orange-500 hover:bg-orange-100 transition-all">ดีเยี่ยม 🤩</div></label>
          <label class="cursor-pointer"><input type="radio" name="q2" value="ดี" class="peer sr-only"><div class="rounded-xl border-2 border-orange-200 bg-white py-2 text-center text-sm md:text-base peer-checked:bg-orange-500 peer-checked:text-white peer-checked:border-orange-500 hover:bg-orange-100 transition-all">ดี 🙂</div></label>
          <label class="cursor-pointer"><input type="radio" name="q2" value="พอใช้" class="peer sr-only"><div class="rounded-xl border-2 border-orange-200 bg-white py-2 text-center text-sm md:text-base peer-checked:bg-orange-500 peer-checked:text-white peer-checked:border-orange-500 hover:bg-orange-100 transition-all">พอใช้ 😐</div></label>
          <label class="cursor-pointer"><input type="radio" name="q2" value="ควรปรับปรุง" class="peer sr-only"><div class="rounded-xl border-2 border-orange-200 bg-white py-2 text-center text-sm md:text-base peer-checked:bg-orange-500 peer-checked:text-white peer-checked:border-orange-500 hover:bg-orange-100 transition-all">ควรปรับปรุง 😔</div></label>
        </div>
      </div>

      <!-- ข้อ 3 -->
      <div class="question-card bg-orange-50 p-5 rounded-2xl border-2 border-orange-100">
        <label class="block text-lg font-medium text-orange-800 mb-3">
          3. เจ้าหน้าที่พูดจาสุภาพ ยิ้มแย้มแจ่มใส <span class="text-red-500">*</span>
        </label>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
          <label class="cursor-pointer"><input type="radio" name="q3" value="ดีเยี่ยม" class="peer sr-only" required><div class="rounded-xl border-2 border-orange-200 bg-white py-2 text-center text-sm md:text-base peer-checked:bg-orange-500 peer-checked:text-white peer-checked:border-orange-500 hover:bg-orange-100 transition-all">ดีเยี่ยม 🤩</div></label>
          <label class="cursor-pointer"><input type="radio" name="q3" value="ดี" class="peer sr-only"><div class="rounded-xl border-2 border-orange-200 bg-white py-2 text-center text-sm md:text-base peer-checked:bg-orange-500 peer-checked:text-white peer-checked:border-orange-500 hover:bg-orange-100 transition-all">ดี 🙂</div></label>
          <label class="cursor-pointer"><input type="radio" name="q3" value="พอใช้" class="peer sr-only"><div class="rounded-xl border-2 border-orange-200 bg-white py-2 text-center text-sm md:text-base peer-checked:bg-orange-500 peer-checked:text-white peer-checked:border-orange-500 hover:bg-orange-100 transition-all">พอใช้ 😐</div></label>
          <label class="cursor-pointer"><input type="radio" name="q3" value="ควรปรับปรุง" class="peer sr-only"><div class="rounded-xl border-2 border-orange-200 bg-white py-2 text-center text-sm md:text-base peer-checked:bg-orange-500 peer-checked:text-white peer-checked:border-orange-500 hover:bg-orange-100 transition-all">ควรปรับปรุง 😔</div></label>
        </div>
      </div>

      <!-- ข้อ 4 -->
      <div class="question-card bg-orange-50 p-5 rounded-2xl border-2 border-orange-100">
        <label class="block text-lg font-medium text-orange-800 mb-3">
          4. ความพึงพอใจโดยรวม <span class="text-red-500">*</span>
        </label>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
          <label class="cursor-pointer"><input type="radio" name="q4" value="ดีเยี่ยม" class="peer sr-only" required><div class="rounded-xl border-2 border-orange-200 bg-white py-2 text-center text-sm md:text-base peer-checked:bg-orange-500 peer-checked:text-white peer-checked:border-orange-500 hover:bg-orange-100 transition-all">ดีเยี่ยม 🤩</div></label>
          <label class="cursor-pointer"><input type="radio" name="q4" value="ดี" class="peer sr-only"><div class="rounded-xl border-2 border-orange-200 bg-white py-2 text-center text-sm md:text-base peer-checked:bg-orange-500 peer-checked:text-white peer-checked:border-orange-500 hover:bg-orange-100 transition-all">ดี 🙂</div></label>
          <label class="cursor-pointer"><input type="radio" name="q4" value="พอใช้" class="peer sr-only"><div class="rounded-xl border-2 border-orange-200 bg-white py-2 text-center text-sm md:text-base peer-checked:bg-orange-500 peer-checked:text-white peer-checked:border-orange-500 hover:bg-orange-100 transition-all">พอใช้ 😐</div></label>
          <label class="cursor-pointer"><input type="radio" name="q4" value="ควรปรับปรุง" class="peer sr-only"><div class="rounded-xl border-2 border-orange-200 bg-white py-2 text-center text-sm md:text-base peer-checked:bg-orange-500 peer-checked:text-white peer-checked:border-orange-500 hover:bg-orange-100 transition-all">ควรปรับปรุง 😔</div></label>
        </div>
      </div>

      <!-- Text Areas -->
      <div class="space-y-4">
        <div>
          <label class="block text-base font-medium text-gray-700 mb-1">ข้อเสนอแนะ (ทางเรายินดีรับฟังเพิ่มเติม)</label>
          <textarea name="suggestion" rows="2" class="w-full rounded-2xl border-2 border-orange-200 p-3 focus:outline-none focus:border-orange-500 focus:ring-2 focus:ring-orange-200 transition-all placeholder-gray-300" placeholder="พิมพ์ข้อความของคุณที่นี่..."></textarea>
        </div>
        
        <div>
          <label class="block text-base font-medium text-gray-700 mb-1">ข้อควรปรับปรุง (เพื่อการบริการที่ดียิ่งขึ้น)</label>
          <textarea name="improvement" rows="2" class="w-full rounded-2xl border-2 border-orange-200 p-3 focus:outline-none focus:border-orange-500 focus:ring-2 focus:ring-orange-200 transition-all placeholder-gray-300" placeholder="พิมพ์ข้อความของคุณที่นี่..."></textarea>
        </div>
      </div>

      <!-- Submit Button -->
      <button type="submit" id="submitBtn" class="w-full bg-gradient-to-r from-orange-500 to-orange-400 hover:from-orange-600 hover:to-orange-500 text-white font-bold py-4 px-6 rounded-2xl shadow-lg transform transition-all active:scale-95 flex justify-center items-center gap-2 text-lg">
        <span>ส่งแบบประเมิน</span>
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
        </svg>
      </button>
    </form>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="absolute inset-0 bg-white bg-opacity-90 flex flex-col items-center justify-center hidden z-20 rounded-[2rem]">
      <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-orange-500 mb-4"></div>
      <p class="text-orange-600 font-medium text-lg animate-pulse">กำลังบันทึกข้อมูล...</p>
    </div>

    <!-- Success/Error Modal -->
    <div id="messageModal" class="absolute inset-0 bg-black bg-opacity-40 flex items-center justify-center hidden z-30 rounded-[2rem] p-4">
      <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl transform transition-all scale-95 opacity-0" id="modalContent">
        <div id="modalIcon" class="text-6xl mb-4">🎉</div>
        <h3 id="modalTitle" class="text-2xl font-bold text-gray-800 mb-2">สำเร็จ!</h3>
        <p id="modalMessage" class="text-gray-600 mb-6">บันทึกข้อมูลเรียบร้อยแล้ว</p>
        <button onclick="closeModal()" class="w-full bg-orange-100 text-orange-600 font-bold py-3 px-4 rounded-xl hover:bg-orange-200 transition-colors">
          ตกลง
        </button>
      </div>
    </div>

  </div>

  <script>
    // ฟังก์ชันจัดการตอนกด Submit Form
    function submitForm(event) {
      event.preventDefault(); // ป้องกันการ Refresh หน้าเว็บ
      
      const form = document.getElementById('surveyForm');
      const submitBtn = document.getElementById('submitBtn');
      const loadingOverlay = document.getElementById('loadingOverlay');

      // รวบรวมข้อมูลจากฟอร์ม
      const formData = {
        q1: form.q1.value,
        q2: form.q2.value,
        q3: form.q3.value,
        q4: form.q4.value,
        suggestion: form.suggestion.value,
        improvement: form.improvement.value
      };

      // แสดง Loading
      submitBtn.disabled = true;
      loadingOverlay.classList.remove('hidden');

      // เรียกใช้ Google Apps Script ฝั่ง Server
      google.script.run
        .withSuccessHandler(function(response) {
          // ซ่อน Loading
          loadingOverlay.classList.add('hidden');
          submitBtn.disabled = false;
          
          if(response.success) {
            showModal('🎉', 'สำเร็จ!', response.message, true);
          } else {
            showModal('❌', 'ผิดพลาด', response.message, false);
          }
        })
        .withFailureHandler(function(error) {
          loadingOverlay.classList.add('hidden');
          submitBtn.disabled = false;
          showModal('🔌', 'การเชื่อมต่อขัดข้อง', 'โปรดตรวจสอบอินเทอร์เน็ตแล้วลองใหม่อีกครั้ง', false);
        })
        .saveData(formData);
    }

    // ฟังก์ชันแสดง Modal แจ้งเตือน
    function showModal(icon, title, message, isSuccess) {
      const modal = document.getElementById('messageModal');
      const modalContent = document.getElementById('modalContent');
      
      document.getElementById('modalIcon').innerText = icon;
      document.getElementById('modalTitle').innerText = title;
      document.getElementById('modalTitle').className = isSuccess ? 'text-2xl font-bold text-green-600 mb-2' : 'text-2xl font-bold text-red-600 mb-2';
      document.getElementById('modalMessage').innerText = message;
      
      modal.classList.remove('hidden');
      
      // Animation แสดง Modal
      setTimeout(() => {
        modalContent.classList.remove('scale-95', 'opacity-0');
        modalContent.classList.add('scale-100', 'opacity-100');
      }, 10);
    }

    // ฟังก์ชันปิด Modal และล้างฟอร์ม
    function closeModal() {
      const modal = document.getElementById('messageModal');
      const modalContent = document.getElementById('modalContent');
      const form = document.getElementById('surveyForm');
      
      // Animation ปิด Modal
      modalContent.classList.remove('scale-100', 'opacity-100');
      modalContent.classList.add('scale-95', 'opacity-0');
      
      setTimeout(() => {
        modal.classList.add('hidden');
        // ล้างข้อมูลในฟอร์มเมื่อปิด Modal แบบ Success
        if(document.getElementById('modalTitle').innerText === 'สำเร็จ!') {
          form.reset();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }
      }, 200);
    }
  </script>
</body>
</html>
